version: "3.9"

# ═══════════════════════════════════════════════════════════════════
# CodePilot AI — Production Docker Compose
# All secrets come from .env (copy .env.example → .env and fill in)
# Start: docker-compose up -d
# Logs:  docker-compose logs -f backend worker
# ═══════════════════════════════════════════════════════════════════

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-app-env: &app-env
  env_file: ./backend/.env
  environment:
    DATABASE_URL: postgresql://${POSTGRES_USER:-codepilot}:${POSTGRES_PASSWORD:-codepilot_pass_123}@postgres:5432/${POSTGRES_DB:-codepilot}
    REDIS_URL: redis://redis:6379/0
    QDRANT_HOST: qdrant
    QDRANT_PORT: 6333
    S3_ENDPOINT_URL: http://minio:9000

services:
  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: codepilot-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codepilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codepilot_pass_123}
      POSTGRES_DB: ${POSTGRES_DB:-codepilot}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codepilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: codepilot-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: codepilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: codepilot-minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio_user}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio_password_123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # ── DB Migration (runs once, then exits) ────────────────────────

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: codepilot-backend:latest
    container_name: codepilot-migrate
    <<: *app-env
    command: ["python", "-c", "from services.db_service import init_db; init_db(); print('[Migrate] DB schema ready.')"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Application ──────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: codepilot-backend:latest
    container_name: codepilot-backend
    <<: *app-env
    volumes:
      - repo_data:/app/repos
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    logging: *default-logging
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: codepilot-backend:latest
    container_name: codepilot-worker
    command: ["python", "worker.py"]
    <<: *app-env
    volumes:
      - repo_data:/app/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    logging: *default-logging
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: codepilot-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    restart: unless-stopped

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  repo_data:
