name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 1: Lint, format, and test
  # ──────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        # No --health-cmd: qdrant image does not ship curl/wget.
        # Readiness is checked in the 'Wait for services' step below.

    defaults:
      run:
        working-directory: backend

    env:
      LLM_BASE_URL: https://openrouter.ai/api/v1
      LLM_API_KEY: ""  # Empty so test mocks activate correctly
      LLM_MODEL: openai/gpt-4o-mini
      LLM_APP_NAME: CodePilot AI
      LLM_SITE_URL: http://localhost:5173
      # No DATABASE_URL — db_service auto-falls back to SQLite cleanly
      REDIS_URL: redis://localhost:6379/0
      QDRANT_HOST: localhost
      QDRANT_PORT: 6333
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: test-access-key
      S3_SECRET_KEY: test-secret-key
      S3_BUCKET_NAME: codepilot-test
      JWT_SECRET: ci-test-jwt-secret-key
      API_TITLE: CodePilot AI
      API_VERSION: 1.0.0
      CORS_ORIGINS: '["http://localhost:5173"]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for services to be ready
        run: |
          echo "Waiting for Redis (TCP port 6379)..."
          timeout 30 bash -c 'until nc -z 127.0.0.1 6379; do sleep 1; done'
          echo "Redis ready."
          echo "Waiting for Qdrant (HTTP /healthz)..."
          timeout 60 bash -c 'until curl -sf http://localhost:6333/healthz > /dev/null; do sleep 2; done'
          echo "Qdrant ready."

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Check formatting (ruff format)
        run: ruff format --check .

      - name: Lint (ruff check)
        run: ruff check .

      - name: Smoke test — FastAPI imports
        run: python -c "import main; print('Import OK')"

      - name: Run unit tests
        run: python -m pytest --ignore=repos -v --tb=short

  # ──────────────────────────────────────────────────────────────────
  # Job 2: Build Docker images (only on push to main)
  # ──────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/codepilot-backend:latest
            ghcr.io/${{ github.repository_owner }}/codepilot-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/codepilot-worker:latest
            ghcr.io/${{ github.repository_owner }}/codepilot-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max