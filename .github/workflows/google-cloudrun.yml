name: Deploy to Google Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: codepilot-502206
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY_REPO: codepilot-ai
  SERVICE_NAME: codepilot-api

jobs:
  deploy:
    name: Build, Publish, and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required if using Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticating via Workload Identity Federation (recommended and does not require SA JSON keys):
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run (API)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: --memory=1Gi
          env_vars: |
            ENFORCE_STRICT_AUTH=false
            REDIS_URL=${{ secrets.REDIS_URL || 'redis://127.0.0.1:6379/0' }}
            DATABASE_URL=${{ secrets.DATABASE_URL || 'postgresql://codepilot:codepilot_pass_123@127.0.0.1:5435/codepilot' }}
            S3_ENDPOINT_URL=${{ secrets.S3_ENDPOINT_URL || 'http://127.0.0.1:9000' }}
            S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY || 'minio_user' }}
            S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY || 'minio_password_123' }}
            S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME || 'codepilot-storage' }}
